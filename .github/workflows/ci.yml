name: CI

on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime-id: linux-x64
            ext: zip
          - os: windows-latest
            runtime-id: win-x64
            ext: zip
          - os: macos-latest
            runtime-id: osx-x64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore OneFileBox.csproj

      - name: Build
        run: dotnet build -c Release --no-restore OneFileBox.csproj

      - name: Test
        run: dotnet test -c Release --no-build --verbosity quiet
        continue-on-error: true

      - name: Publish (${{ matrix.runtime-id }})
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet publish OneFileBox.csproj -c Release --no-restore -r ${{ matrix.runtime-id }} -p:PublishReadyToRun=true -o ./publish/${{ matrix.runtime-id }}

      - name: Package (${{ matrix.runtime-id }})
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd publish/${{ matrix.runtime-id }}
          if [[ "${{ matrix.os }}" == windows-latest ]]; then
            powershell -Command "Compress-Archive -Path '*' -DestinationPath '../OneFileBox-${{ github.ref_name }}-${{ matrix.runtime-id }}.zip' -Force"
          else
            zip -r ../OneFileBox-${{ github.ref_name }}-${{ matrix.runtime-id }}.zip .
          fi

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
